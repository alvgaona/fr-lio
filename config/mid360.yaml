/**:
    ros__parameters:
        feature_extract_enable: false
        point_filter_num: 1
        max_iteration: 3
        filter_size_surf: 0.15
        filter_size_map: 0.5
        cube_side_length: 100.0
        runtime_pos_log_enable: false

        common:
            lid_topic:  "/livox/lidar_accumulated"
            imu_topic:  "/livox/imu"
            time_sync_en: false         # ONLY turn on when external time synchronization is really not possible
            time_offset_lidar_to_imu: 0.0 # Time offset between lidar and IMU calibrated by other algorithms, e.g. LI-Init (can be found in README).
                                        # This param will take effect no matter what time_sync_en is. So if the time offset is not known exactly, please set as 0.0

        preprocess:
            lidar_type: 1                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR, 4 for any other pointcloud input
            scan_line:  4
            blind: 0.5
            timestamp_unit: 3
            scan_rate: 10

        mapping:
            acc_cov: 0.1
            gyr_cov: 0.1
            b_acc_cov: 0.0001
            b_gyr_cov: 0.0001
            fov_degree:    360.0
            det_range:     100.0
            extrinsic_est_en:  true      # true: enable the online estimation of IMU-LiDAR extrinsic
            use_scan_to_scan_cov: false  # true: estimate drift covariance from scan-to-scan registration
            use_perpoint_cov: false      # true: per-point Σ from k-NN replaces scalar LASER_POINT_COV (and scalar R_s2s when use_scan_to_scan_cov is on)
            point_range_noise_std: 0.02  # m, sensor range noise (Mid-360 datasheet); used only when use_perpoint_cov is true
            enable_shadow_map: false     # true: absorb points evicted from the working ikd-Tree into a voxel-deduplicated shadow tree
            shadow_voxel_size: 0.2       # m, voxel size for shadow-map dedup
            enable_map_correction: false # true: tag points with source keyframe idx, expose correct_map() for LC-triggered rebuild (requires enable_shadow_map)
            extrinsic_T: [ -0.011, -0.02329, 0.04412 ]
            extrinsic_R: [ 1., 0., 0.,
                            0., 1., 0.,
                            0., 0., 1.]

        publish:
            path_en: true                # true: publish Path
            effect_map_en: true          # true: publish Effects
            map_en: false                # true: publish Map cloud
            scan_publish_en:  true       # false: close all the point cloud output
            dense_publish_en: false      # false: low down the points number in a global-frame point clouds scan.
            scan_bodyframe_pub_en: false  # true: output the point cloud scans in IMU-body-frame
            vel_filter_alpha: 0.05        # 1.0: no filtering, lower = smoother velocity
